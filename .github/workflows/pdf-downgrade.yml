name: Batch PDF repair to PDF 1.4

on:
  workflow_dispatch:
    inputs:
      pdfsettings:
        description: 'Profil Ghostscript: /prepress, /printer, /ebook, /screen'
        required: false
        default: '/prepress'
      allow_raster_fallback:
        description: 'Zezwól na fallback rastrowy (true/false)'
        required: false
        default: 'true'
      raster_dpi:
        description: 'DPI dla fallbacku rastrowego'
        required: false
        default: '300'
  push:
    paths:
      - "input/**/*.pdf"
      - "input/**/*.PDF"

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ghostscript qpdf mupdf-tools poppler-utils imagemagick

      - name: Convert all PDFs from input/
        shell: bash
        env:
          PDFSETTINGS: ${{ github.event.inputs.pdfsettings || '/prepress' }}
          ALLOW_RASTER: ${{ github.event.inputs.allow_raster_fallback || 'true' }}
          RASTER_DPI: ${{ github.event.inputs.raster_dpi || '300' }}
        run: |
          set +e
          mkdir -p output logs

          mapfile -t files < <(find input -type f \( -iname "*.pdf" -o -iname "*.PDF" \) | sort)

          if (( ${#files[@]} == 0 )); then
            echo "No PDF files found in input/"
            exit 66
          fi

          success_count=0
          fail_count=0

          for f in "${files[@]}"; do
            base="$(basename "$f")"
            stem="${base%.*}"
            out="output/${stem}_PDF14.pdf"
            log="logs/${stem}.log"

            echo "=== Processing: $f ===" | tee "$log"

            # 1. Ghostscript direct
            gs -sDEVICE=pdfwrite \
               -dCompatibilityLevel=1.4 \
               -dNOPAUSE -dBATCH \
               -dPDFSETTINGS="${PDFSETTINGS}" \
               -sOutputFile="$out" "$f" >>"$log" 2>&1

            if [[ -s "$out" ]]; then
              echo "OK: Ghostscript" | tee -a "$log"
              success_count=$((success_count+1))
              continue
            fi

            # 2. qpdf -> Ghostscript
            tmp1="$(mktemp --suffix=.pdf)"
            qpdf --linearize "$f" "$tmp1" >>"$log" 2>&1
            gs -sDEVICE=pdfwrite \
               -dCompatibilityLevel=1.4 \
               -dNOPAUSE -dBATCH \
               -dPDFSETTINGS="${PDFSETTINGS}" \
               -sOutputFile="$out" "$tmp1" >>"$log" 2>&1
            rm -f "$tmp1"

            if [[ -s "$out" ]]; then
              echo "OK: qpdf + Ghostscript" | tee -a "$log"
              success_count=$((success_count+1))
              continue
            fi

            # 3. MuPDF clean -> Ghostscript
            tmp2="$(mktemp --suffix=.pdf)"
            mutool clean -gg -d "$f" "$tmp2" >>"$log" 2>&1
            gs -sDEVICE=pdfwrite \
               -dCompatibilityLevel=1.4 \
               -dNOPAUSE -dBATCH \
               -dPDFSETTINGS="${PDFSETTINGS}" \
               -sOutputFile="$out" "$tmp2" >>"$log" 2>&1
            rm -f "$tmp2"

            if [[ -s "$out" ]]; then
              echo "OK: MuPDF + Ghostscript" | tee -a "$log"
              success_count=$((success_count+1))
              continue
            fi

            # 4. Raster fallback
            if [[ "${ALLOW_RASTER}" == "true" ]]; then
              raster_base="output/${stem}_RASTER"
              pdftocairo -pdf -r "${RASTER_DPI}" "$f" "$raster_base" >>"$log" 2>&1

              if [[ -s "${raster_base}.pdf" ]]; then
                mv "${raster_base}.pdf" "output/${stem}_RASTER_PDF14.pdf"
                echo "OK: Raster fallback" | tee -a "$log"
                success_count=$((success_count+1))
                continue
              fi
            fi

            echo "FAIL: all methods failed for $f" | tee -a "$log"
            fail_count=$((fail_count+1))
          done

          echo "Successful: $success_count"
          echo "Failed: $fail_count"

          # workflow ma być zielony, jeśli przynajmniej 1 plik się udał
          if (( success_count == 0 )); then
            exit 1
          fi

      - name: Show outputs
        if: always()
        run: |
          echo "=== OUTPUT FILES ==="
          find output -type f | sort || true
          echo "=== LOG FILES ==="
          find logs -type f | sort || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: converted-pdfs-and-logs
          path: |
            output
            logs
          retention-days: 14
